# Cloud Build pipeline:
#   1. Maven empaqueta el proyecto Quarkus (genera target/quarkus-app).
#   2. Docker construye la imagen runtime-only con APP_VERSION como build-arg.
#   3. Push a Artifact Registry con tags :<version> y :latest.
#
# Version precedencia (primero que exista):
#   - $TAG_NAME   (cuando el build lo dispara un git tag)
#   - $SHORT_SHA  (cualquier push a branch)
#   - "dev"       (build local sin git context)
#
# Destino: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}

substitutions:
  _REGION: us-central1
  _REPOSITORY: backendgrupo2
  _IMAGE: backend
  _SERVICE: backendgrupo2
  _PROJECT_ID: tc3005b-494022

options:
  logging: LEGACY

steps:
  - id: package
    name: maven:3.9-eclipse-temurin-21
    entrypoint: ./mvnw
    args: ['-B', '-DskipTests', 'package']

  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        VERSION="$${TAG_NAME:-$${SHORT_SHA:-dev}}"
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE}"
        echo "Building $$IMAGE_BASE:$$VERSION"
        docker build \
          --build-arg APP_VERSION="$$VERSION" \
          --tag "$$IMAGE_BASE:$$VERSION" \
          --tag "$$IMAGE_BASE:latest" \
          --file=Dockerfile \
          .
        docker push "$$IMAGE_BASE:$$VERSION"
        docker push "$$IMAGE_BASE:latest"

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        VERSION="$${TAG_NAME:-$${SHORT_SHA:-dev}}"
        IMAGE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:$$VERSION"
        gcloud run deploy ${_SERVICE} \
          --image "$$IMAGE" \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated

timeout: 1800s
