<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walkthrough: Testing en Quarkus con H2</title>
<style>
  :root {
    --bg: #0f172a;
    --bg-2: #1e293b;
    --bg-3: #334155;
    --fg: #e2e8f0;
    --fg-dim: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #a78bfa;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --border: #334155;
    --code-bg: #0b1220;
    --add: rgba(74, 222, 128, 0.12);
    --add-border: #4ade80;
    --del: rgba(248, 113, 113, 0.12);
    --del-border: #f87171;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.6;
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  aside {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  aside h2 {
    color: var(--accent);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0 0 16px 8px;
  }
  .step-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .step-list li {
    margin-bottom: 4px;
  }
  .step-list button {
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg-dim);
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-list button:hover {
    background: var(--bg-3);
    color: var(--fg);
  }
  .step-list button.active {
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(167, 139, 250, 0.15));
    color: var(--fg);
    border-color: var(--accent);
  }
  .step-list .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg-3);
    color: var(--fg);
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .step-list .active .num {
    background: var(--accent);
    color: var(--bg);
  }
  .step-list .done .num {
    background: var(--green);
    color: var(--bg);
  }
  main {
    padding: 40px 56px;
    max-width: 1000px;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  .header h1 {
    margin: 0 0 8px 0;
    font-size: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    margin: 0;
    color: var(--fg-dim);
    font-size: 15px;
  }
  .step {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .step.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .step h2 {
    color: var(--accent);
    font-size: 22px;
    margin-top: 0;
  }
  .step h3 {
    color: var(--accent-2);
    font-size: 16px;
    margin-top: 28px;
    margin-bottom: 8px;
  }
  .step p {
    color: var(--fg);
    font-size: 15px;
  }
  .step ul, .step ol {
    color: var(--fg);
  }
  .step li { margin-bottom: 6px; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 6px;
  }
  .badge-new { background: var(--green); color: var(--bg); }
  .badge-edit { background: var(--yellow); color: var(--bg); }
  .badge-del { background: var(--red); color: var(--bg); }
  .badge-info { background: var(--accent); color: var(--bg); }

  .file-path {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    background: var(--bg-3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 13px;
    display: inline-block;
    margin-bottom: 6px;
  }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.55;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
  }
  code { font-family: "SF Mono", Menlo, Monaco, Consolas, monospace; }
  pre code { color: #cbd5e1; }
  .kw { color: #c084fc; }
  .str { color: #86efac; }
  .num-lit { color: #fbbf24; }
  .com { color: #64748b; font-style: italic; }
  .type { color: #38bdf8; }
  .ann { color: #fb7185; }
  .fn { color: #fde047; }

  .diff-line { display: block; padding: 0 8px; margin: 0 -16px; }
  .diff-add { background: var(--add); border-left: 3px solid var(--add-border); }
  .diff-del { background: var(--del); border-left: 3px solid var(--del-border); }

  .callout {
    border-left: 4px solid var(--accent);
    background: rgba(56, 189, 248, 0.08);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
  }
  .callout.warn {
    border-left-color: var(--yellow);
    background: rgba(251, 191, 36, 0.08);
  }
  .callout.success {
    border-left-color: var(--green);
    background: rgba(74, 222, 128, 0.08);
  }
  .callout strong { color: var(--accent); }
  .callout.warn strong { color: var(--yellow); }
  .callout.success strong { color: var(--green); }

  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .nav button {
    background: var(--bg-2);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .nav button:hover:not(:disabled) {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .nav button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .progress {
    height: 4px;
    background: var(--bg-2);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.3s ease;
  }
  .quiz {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 16px 0;
  }
  .quiz strong { color: var(--accent-2); }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .quiz-options button {
    background: var(--bg-3);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 14px;
  }
  .quiz-options button:hover { border-color: var(--accent); }
  .quiz-options button.correct { background: rgba(74, 222, 128, 0.2); border-color: var(--green); }
  .quiz-options button.wrong { background: rgba(248, 113, 113, 0.2); border-color: var(--red); }
  .quiz-feedback { margin-top: 12px; font-size: 14px; min-height: 20px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 20px 0;
  }
  .stat {
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 8px;
    text-align: center;
  }
  .stat .n {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .stat .l {
    font-size: 12px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  details {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 12px 0;
  }
  summary {
    cursor: pointer;
    color: var(--accent);
    font-weight: 600;
    user-select: none;
  }
  details[open] summary { margin-bottom: 12px; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    aside { position: relative; height: auto; }
    main { padding: 24px 20px; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside>
    <h2>Pasos</h2>
    <ul class="step-list" id="stepList"></ul>
  </aside>

  <main>
    <div class="header">
      <h1>Testing en Quarkus con H2</h1>
      <p>Walkthrough interactivo: cómo agregamos pruebas unitarias e integración a un proyecto Quarkus que usa MySQL en producción y H2 in-memory en tests.</p>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div id="content"></div>

    <div class="nav">
      <button id="prevBtn">← Anterior</button>
      <button id="nextBtn">Siguiente →</button>
    </div>
  </main>
</div>

<script>
const steps = [
  {
    title: "Visión general",
    content: `
      <h2>¿Qué vamos a hacer?</h2>
      <p>El proyecto es una API en <strong>Quarkus</strong> con arquitectura en capas (Clean Architecture):</p>
      <ul>
        <li><code>domain</code> — modelos e interfaces de repositorios</li>
        <li><code>application/usecase</code> — casos de uso (lógica de negocio)</li>
        <li><code>infrastructure/repository</code> — implementaciones Panache (JPA)</li>
        <li><code>interfaces/rest</code> — endpoints JAX-RS</li>
      </ul>
      <p>Vamos a agregar dos tipos de pruebas:</p>

      <div class="stats">
        <div class="stat"><span class="n">4</span><span class="l">Pruebas unitarias</span></div>
        <div class="stat"><span class="n">6</span><span class="l">Pruebas integración</span></div>
        <div class="stat"><span class="n">10</span><span class="l">Tests totales</span></div>
        <div class="stat"><span class="n">H2</span><span class="l">DB en memoria</span></div>
      </div>

      <h3>Diferencia clave</h3>
      <p><span class="badge badge-info">Unitaria</span> Aísla un componente con <strong>Mockito</strong>: rápido, sin Quarkus, sin BD.</p>
      <p><span class="badge badge-info">Integración</span> Levanta Quarkus completo con <code>@QuarkusTest</code>, BD H2 real, y verifica que el flujo HTTP → caso de uso → repositorio → BD funcione end-to-end.</p>

      <div class="callout">
        <strong>Reto principal:</strong> el proyecto usa Firebase para autenticación. Como Firebase no se puede arrancar en tests, vamos a aislar sus llamadas para poder mockearlas.
      </div>
    `
  },

  {
    title: "Dependencias (pom.xml)",
    content: `
      <h2>1. Agregar dependencias de testing</h2>
      <p>Necesitamos tres dependencias nuevas en <code>pom.xml</code>, todas con <code>scope=test</code>:</p>
      <div class="file-path">pom.xml</div>
      <pre><code><span class="diff-line diff-add"><span class="ann">&lt;dependency&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;groupId&gt;</span>io.quarkus<span class="ann">&lt;/groupId&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;artifactId&gt;</span>quarkus-jdbc-h2<span class="ann">&lt;/artifactId&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;scope&gt;</span>test<span class="ann">&lt;/scope&gt;</span></span>
<span class="diff-line diff-add"><span class="ann">&lt;/dependency&gt;</span></span>
<span class="diff-line diff-add"><span class="ann">&lt;dependency&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;groupId&gt;</span>io.quarkus<span class="ann">&lt;/groupId&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;artifactId&gt;</span>quarkus-junit5-mockito<span class="ann">&lt;/artifactId&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;scope&gt;</span>test<span class="ann">&lt;/scope&gt;</span></span>
<span class="diff-line diff-add"><span class="ann">&lt;/dependency&gt;</span></span>
<span class="diff-line diff-add"><span class="ann">&lt;dependency&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;groupId&gt;</span>org.mockito<span class="ann">&lt;/groupId&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;artifactId&gt;</span>mockito-inline<span class="ann">&lt;/artifactId&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;version&gt;</span>5.2.0<span class="ann">&lt;/version&gt;</span></span>
<span class="diff-line diff-add">    <span class="ann">&lt;scope&gt;</span>test<span class="ann">&lt;/scope&gt;</span></span>
<span class="diff-line diff-add"><span class="ann">&lt;/dependency&gt;</span></span></code></pre>

      <h3>¿Para qué sirve cada una?</h3>
      <ul>
        <li><strong>quarkus-jdbc-h2</strong>: driver JDBC de la BD H2 in-memory.</li>
        <li><strong>quarkus-junit5-mockito</strong>: integración Quarkus + Mockito (provee <code>@InjectMock</code>).</li>
        <li><strong>mockito-inline</strong>: motor de Mockito que permite mockear métodos estáticos y clases finales.</li>
      </ul>

      <div class="quiz" data-correct="1">
        <strong>¿Por qué <code>scope=test</code>?</strong>
        <div class="quiz-options">
          <button>Para que la app no inicie con H2 por accidente</button>
          <button>Para que las dependencias solo se incluyan al compilar y ejecutar tests, no en el JAR de producción</button>
          <button>Es opcional, da lo mismo</button>
        </div>
        <div class="quiz-feedback"></div>
      </div>
    `
  },

  {
    title: "Configurar H2 (application.properties)",
    content: `
      <h2>2. Perfil de test con H2 in-memory</h2>
      <p>Quarkus permite configuración por <strong>perfil</strong> usando el prefijo <code>%nombre.</code>. El perfil <code>test</code> se activa automáticamente cuando corres <code>mvn test</code>.</p>

      <div class="file-path">src/main/resources/application.properties</div>
      <pre><code><span class="com"># Producción: MySQL</span>
quarkus.datasource.db-kind = mysql
quarkus.datasource.username = root
quarkus.datasource.password = andrestorres
quarkus.datasource.jdbc.url = jdbc:mysql://localhost:3306/todogrupo2
quarkus.hibernate-orm.schema-management.strategy = update
firebase.credentials=src/main/resources/todogrupo2-...firebase-adminsdk....json

<span class="diff-line diff-add"><span class="com"># Test profile: H2 in-memory database</span></span>
<span class="diff-line diff-add"><span class="ann">%test.</span>quarkus.datasource.db-kind=h2</span>
<span class="diff-line diff-add"><span class="ann">%test.</span>quarkus.datasource.username=sa</span>
<span class="diff-line diff-add"><span class="ann">%test.</span>quarkus.datasource.password=</span>
<span class="diff-line diff-add"><span class="ann">%test.</span>quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE</span>
<span class="diff-line diff-add"><span class="ann">%test.</span>quarkus.datasource.jdbc.driver=org.h2.Driver</span>
<span class="diff-line diff-add"><span class="ann">%test.</span>quarkus.hibernate-orm.schema-management.strategy=drop-and-create</span>
<span class="diff-line diff-add"><span class="ann">%test.</span>firebase.credentials=src/test/resources/firebase-fake.json</span></code></pre>

      <h3>Detalles importantes de la URL de H2</h3>
      <ul>
        <li><code>jdbc:h2:mem:testdb</code> — base de datos en memoria llamada <code>testdb</code></li>
        <li><code>DB_CLOSE_DELAY=-1</code> — la BD vive mientras la JVM esté arriba</li>
        <li><code>MODE=MySQL</code> — H2 emula sintaxis MySQL para que las queries del proyecto funcionen igual</li>
        <li><code>DATABASE_TO_LOWER=TRUE</code> — nombres de tablas en minúsculas como en MySQL</li>
      </ul>

      <div class="callout">
        <strong>drop-and-create</strong> en tests significa que cada arranque de Quarkus borra y recrea las tablas, garantizando una BD limpia.
      </div>
    `
  },

  {
    title: "Unit test: CreateTodoUseCase",
    content: `
      <h2>3. Prueba unitaria del caso de uso CreateTodo</h2>
      <p>Una prueba unitaria <strong>NO</strong> usa Quarkus ni BD. Se enfoca solo en la lógica del caso de uso, mockeando sus dependencias (repositorio + contexto de auth).</p>

      <div class="file-path">src/test/java/org/acme/application/usecase/CreateTodoUseCaseTest.java</div>
      <pre><code><span class="ann">@BeforeEach</span>
<span class="kw">void</span> <span class="fn">setUp</span>() {
    todoRepository = <span class="fn">mock</span>(TodoRepository.<span class="kw">class</span>);
    authContext = <span class="fn">mock</span>(AuthContext.<span class="kw">class</span>);

    User authenticatedUser = <span class="kw">new</span> <span class="type">User</span>(
        UUID.<span class="fn">randomUUID</span>(), <span class="str">"test@test.com"</span>, <span class="str">"Test User"</span>,
        <span class="str">"USER"</span>, <span class="kw">true</span>, <span class="str">"firebase-uid"</span>);
    <span class="fn">when</span>(authContext.<span class="fn">getUser</span>()).<span class="fn">thenReturn</span>(authenticatedUser);
    <span class="fn">when</span>(todoRepository.<span class="fn">save</span>(<span class="fn">any</span>(Todo.<span class="kw">class</span>)))
        .<span class="fn">thenAnswer</span>(inv -&gt; inv.<span class="fn">getArgument</span>(<span class="num-lit">0</span>));

    useCase = <span class="kw">new</span> <span class="type">CreateTodoUseCase</span>(todoRepository, authContext);
}

<span class="ann">@Test</span>
<span class="kw">void</span> <span class="fn">executeShouldPersistTodoWithGeneratedIdAndCreatedAt</span>() {
    CreateTodoDto dto = <span class="kw">new</span> <span class="type">CreateTodoDto</span>(<span class="str">"Buy milk"</span>, <span class="str">"2 liters"</span>);

    Todo result = useCase.<span class="fn">execute</span>(dto);

    <span class="fn">assertNotNull</span>(result.<span class="fn">getId</span>());        <span class="com">// id generado</span>
    <span class="fn">assertNotNull</span>(result.<span class="fn">getCreatedAt</span>()); <span class="com">// timestamp generado</span>
    <span class="fn">assertEquals</span>(<span class="str">"Buy milk"</span>, result.<span class="fn">getTitle</span>());

    ArgumentCaptor&lt;Todo&gt; captor = ArgumentCaptor.<span class="fn">forClass</span>(Todo.<span class="kw">class</span>);
    <span class="fn">verify</span>(todoRepository).<span class="fn">save</span>(captor.<span class="fn">capture</span>());
    <span class="com">// validar lo que se mandó al repo</span>
}</code></pre>

      <h3>Conceptos clave de Mockito</h3>
      <ul>
        <li><code>mock(Clase.class)</code> — crea un objeto falso</li>
        <li><code>when(...).thenReturn(...)</code> — define comportamiento</li>
        <li><code>verify(...)</code> — comprueba que el método se llamó</li>
        <li><code>ArgumentCaptor</code> — captura el argumento real con el que se llamó al mock</li>
      </ul>
    `
  },

  {
    title: "Refactor: FirebaseUserCreator",
    content: `
      <h2>4. El problema de Firebase y cómo aislarlo</h2>
      <p>El caso de uso <code>RegisterUserUseCase</code> llama a <code>FirebaseAuth.getInstance().createUser(...)</code> directamente. Esto es un <strong>método estático</strong> que requiere que Firebase esté inicializado, cosa que no podemos hacer en tests.</p>

      <div class="callout warn">
        <strong>Regla de oro:</strong> los métodos estáticos son enemigos del testing. La solución estándar es <em>envolverlos</em> en una clase inyectable.
      </div>

      <h3>Antes (imposible de testear sin Firebase real)</h3>
      <pre><code><span class="kw">public</span> User <span class="fn">execute</span>(RegisterUserDto dto) <span class="kw">throws</span> FirebaseAuthException {
    <span class="com">// ...</span>
    UserRecord.CreateRequest request = <span class="kw">new</span> UserRecord.CreateRequest();
    request.<span class="fn">setEmail</span>(user.<span class="fn">getEmail</span>());
    request.<span class="fn">setPassword</span>(dto.<span class="fn">getPassword</span>());
    <span class="diff-line diff-del">    UserRecord rec = FirebaseAuth.<span class="fn">getInstance</span>().<span class="fn">createUser</span>(request); <span class="com">// estático ❌</span></span>
    user.<span class="fn">setFirebaseUuid</span>(rec.<span class="fn">getUid</span>());
    <span class="kw">return</span> userRepository.<span class="fn">create</span>(user);
}</code></pre>

      <h3>Nueva clase: FirebaseUserCreator</h3>
      <p>Creamos un bean CDI delgado que envuelve la llamada estática:</p>
      <div class="file-path">src/main/java/org/acme/infrastructure/firebase/FirebaseUserCreator.java</div>
      <pre><code><span class="ann">@ApplicationScoped</span>
<span class="kw">public class</span> <span class="type">FirebaseUserCreator</span> {

    <span class="kw">public</span> UserRecord <span class="fn">create</span>(String email, String password)
            <span class="kw">throws</span> FirebaseAuthException {
        UserRecord.CreateRequest request = <span class="kw">new</span> UserRecord.CreateRequest();
        request.<span class="fn">setEmail</span>(email);
        request.<span class="fn">setPassword</span>(password);
        request.<span class="fn">setDisabled</span>(<span class="kw">false</span>);
        request.<span class="fn">setEmailVerified</span>(<span class="kw">true</span>);

<span class="ann">@ApplicationScoped</span>

const stepList = document.getElementById('stepList');
const content = document.getElementById('content');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');

let current = 0;

function render() {
  stepList.innerHTML = '';
  steps.forEach((s, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.innerHTML = `<span class="num">${i + 1}</span><span>${s.title}</span>`;
    if (i === current) btn.classList.add('active');
    if (i < current) btn.classList.add('done');
    btn.onclick = () => { current = i; render(); };
    li.appendChild(btn);
    stepList.appendChild(li);
  });

  content.innerHTML = `<div class="step active">${steps[current].content}</div>`;

  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === steps.length - 1;
  progressBar.style.width = `${((current + 1) / steps.length) * 100}%`;

  // Wire up quizzes
  content.querySelectorAll('.quiz').forEach(quiz => {
    const correct = parseInt(quiz.dataset.correct);
    const buttons = quiz.querySelectorAll('.quiz-options button');
    const feedback = quiz.querySelector('.quiz-feedback');
    buttons.forEach((b, idx) => {
      b.onclick = () => {
        buttons.forEach(x => { x.classList.remove('correct', 'wrong'); x.disabled = false; });
        if (idx === correct) {
          b.classList.add('correct');
          feedback.innerHTML = '<span style="color: var(--green)">✓ ¡Correcto!</span>';
        } else {
          b.classList.add('wrong');
          buttons[correct].classList.add('correct');
          feedback.innerHTML = '<span style="color: var(--red)">✗ La respuesta correcta es la marcada en verde.</span>';
        }
      };
    });
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

prevBtn.onclick = () => { if (current > 0) { current--; render(); } };
nextBtn.onclick = () => { if (current < steps.length - 1) { current++; render(); } };

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' && current < steps.length - 1) { current++; render(); }
  if (e.key === 'ArrowLeft' && current > 0) { current--; render(); }
});

render();
</script>
</body>
</html>
