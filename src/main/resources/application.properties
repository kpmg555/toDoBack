# configure your datasource
quarkus.datasource.db-kind = mysql
quarkus.datasource.username = root
quarkus.datasource.password = team55
quarkus.datasource.jdbc.url = jdbc:mysql://136.112.193.254:3306/todoDB

# Demo: drop-and-create on each start so import.sql re-seeds clean state
quarkus.hibernate-orm.schema-management.strategy = drop-and-create

# Production profile (Cloud Run) holaaa
%prod.quarkus.datasource.db-kind = ${DB_KIND:mysql}
%prod.quarkus.datasource.username = root
%prod.quarkus.datasource.password = ${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url = ${DB_JDBC_URL}
%prod.quarkus.hibernate-orm.schema-management.strategy = ${DB_SCHEMA_STRATEGY:update}
quarkus.hibernate-orm.sql-load-script = import.sql

# Show the SQL Hibernate emits (essential for the eager/lazy/N+1 demo)
quarkus.hibernate-orm.log.sql = true
quarkus.hibernate-orm.log.format-sql = true

# Hibernate Statistics so the demo can count queries per hola
quarkus.hibernate-orm.statistics = true

# CORS so the static HTML guide can call the demo endpoints
quarkus.http.cors = true
quarkus.http.cors.origins = *

firebase.credentials=src/main/resources/todogrupo2-dd9dd-firebase-adminsdk-fbsvc-df883834d9.json
%prod.firebase.credentials=/secrets/firebase.json

# Test profile: H2 in-memory database
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
%test.quarkus.datasource.jdbc.driver=org.h2.Driver
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
